<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HTML Tools</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f5f5f5;
      color: #111;
      min-height: 100vh;
    }

    header {
      background: #111;
      color: #fff;
      padding: 2rem;
      text-align: center;
    }

    header h1 { font-size: 2rem; font-weight: 700; letter-spacing: -0.5px; }
    header p  { margin-top: 0.5rem; color: #aaa; font-size: 1rem; }

    main {
      max-width: 900px;
      margin: 2.5rem auto;
      padding: 0 1.5rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1.25rem;
    }

    .card {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 10px;
      padding: 1.5rem;
      text-decoration: none;
      color: inherit;
      transition: box-shadow 0.15s, transform 0.15s;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .card:hover {
      box-shadow: 0 4px 16px rgba(0,0,0,0.10);
      transform: translateY(-2px);
    }

    .card h2 { font-size: 1.1rem; font-weight: 600; }
    .card p  { font-size: 0.9rem; color: #555; }

    .empty {
      text-align: center;
      color: #888;
      margin-top: 3rem;
      font-size: 1rem;
    }

    footer {
      text-align: center;
      padding: 2rem;
      color: #aaa;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <header>
    <h1>HTML Tools</h1>
    <p>Single-file tools — no frameworks, no build step.</p>
  </header>

  <main>
    <div class="grid" id="tools-grid">
      <a class="card" href="vormsi-weather.html">
        <h2>Rälby Weather</h2>
        <p>Current conditions and 7-day forecast for Rälby, Vormsi, Estonia.</p>
      </a>
    </div>
    <p class="empty" id="empty-msg">Tools coming soon.</p>
  </main>

  <footer>
    <a href="https://github.com/paultio/html-tools" target="_blank" rel="noopener">GitHub</a>
  </footer>

  <script>
    const grid = document.getElementById('tools-grid');
    const emptyMsg = document.getElementById('empty-msg');
    if (grid.children.length > 0) emptyMsg.style.display = 'none';
  </script>
</body>
</html>
