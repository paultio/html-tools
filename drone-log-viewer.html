<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Drone Log Viewer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f5f5;
      --surface: #fff;
      --border: #e0e0e0;
      --text: #111;
      --muted: #666;
      --accent: #1d4ed8;
      --radius: 8px;
      --sidebar-w: 290px;
      --header-h: 52px;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      height: var(--header-h);
      flex-shrink: 0;
      background: #111;
      color: #fff;
      padding: 0 1.25rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    header a { color: #aaa; text-decoration: none; font-size: 0.875rem; }
    header a:hover { color: #fff; }
    header h1 { font-size: 1.2rem; font-weight: 700; }
    header .sep { color: #444; }

    /* ── App shell ──────────────────────────────── */
    #app {
      display: flex;
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }

    /* ── Sidebar ────────────────────────────────── */
    #sidebar {
      width: var(--sidebar-w);
      flex-shrink: 0;
      border-right: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #sidebar-top {
      padding: 0.75rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    #sidebar-top-btns { display: flex; gap: 0.4rem; }

    #open-folder-btn {
      flex: 1;
      padding: 0.55rem 0.75rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    #open-folder-btn:hover { background: #1e40af; }

    #refresh-btn {
      padding: 0.55rem 0.65rem;
      background: #f1f5f9; color: #374151;
      border: 1px solid var(--border); border-radius: 6px;
      font-size: 1rem; cursor: pointer; flex-shrink: 0;
      display: none; line-height: 1;
    }
    #refresh-btn.visible { display: block; }
    #refresh-btn:hover { background: #e2e8f0; }
    #refresh-btn.spinning { animation: spin 0.6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    #open-file-link {
      font-size: 0.78rem; color: var(--accent); cursor: pointer;
      text-decoration: underline; text-underline-offset: 2px; display: none;
    }
    #open-file-link.visible { display: block; }

    #folder-input, #file-input { display: none; }

    #sidebar-search {
      padding: 0.4rem 0.6rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 0.8rem;
      width: 100%;
      display: none;
    }
    #sidebar-search.visible { display: block; }

    #sidebar-drop {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 2rem 1rem;
      color: #bbb;
      font-size: 0.82rem;
      text-align: center;
      border: 2px dashed transparent;
      transition: border-color 0.15s, background 0.15s;
    }
    #sidebar-drop.drag-over { border-color: var(--accent); background: #eff6ff; color: #1d4ed8; }
    #sidebar-drop svg { width: 36px; height: 36px; stroke: currentColor; opacity: 0.5; }

    #file-tree {
      flex: 1;
      overflow-y: auto;
      display: none;
    }
    #file-tree.visible { display: block; }

    /* ── File tree groups ───────────────────────── */
    .folder-group { border-bottom: 1px solid #f0f0f0; }

    .folder-group-hdr {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.45rem 0.75rem;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      cursor: pointer;
      user-select: none;
      background: #fafafa;
      position: sticky;
      top: 0;
      z-index: 1;
    }
    .folder-group-hdr:hover { background: #f0f0f0; }
    .folder-group-hdr .fg-arrow { transition: transform 0.15s; font-size: 0.65rem; }
    .folder-group-hdr.collapsed .fg-arrow { transform: rotate(-90deg); }
    .folder-group-hdr .fg-count { margin-left: auto; background: #e5e7eb; border-radius: 99px; padding: 0.05rem 0.45rem; font-size: 0.7rem; }

    .folder-group-body.collapsed { display: none; }

    /* ── File items ─────────────────────────────── */
    .file-item {
      padding: 0.5rem 0.75rem 0.5rem 1rem;
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: background 0.1s;
    }
    .file-item:hover { background: #f5f7ff; }
    .file-item.selected { background: #eff6ff; border-left-color: var(--accent); }

    .fi-row1 {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      margin-bottom: 0.2rem;
    }
    .fi-name {
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--text);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
      min-width: 0;
    }
    .fi-row2 {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      flex-wrap: wrap;
    }

    /* Type badges */
    .type-badge {
      font-size: 0.65rem;
      font-weight: 700;
      padding: 0.08rem 0.4rem;
      border-radius: 3px;
      flex-shrink: 0;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .tb-chat    { background: #dbeafe; color: #1e40af; }
    .tb-log     { background: #dcfce7; color: #15803d; }
    .tb-fleet   { background: #f3f4f6; color: #374151; }
    .tb-mavros  { background: #fef3c7; color: #92400e; }
    .tb-unknown { background: #f3f4f6; color: #6b7280; }

    .fi-tag {
      font-size: 0.7rem;
      color: var(--muted);
      white-space: nowrap;
    }
    .fi-tag.pipeline-tag { color: #7c3aed; font-weight: 600; }
    .fi-dot { color: #ddd; font-size: 0.6rem; }

    /* Scanning spinner */
    .fi-scanning { font-size: 0.7rem; color: #aaa; font-style: italic; }

    /* ── Viewer panel ───────────────────────────── */
    #viewer-panel {
      flex: 1;
      min-width: 0;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    #welcome {
      padding: 2rem 1.25rem 1rem;
    }

    #viewer-drop {
      border: 2px dashed #ddd;
      border-radius: var(--radius);
      background: var(--surface);
      padding: 2rem 1.5rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }
    #viewer-drop.drag-over { border-color: var(--accent); background: #eff6ff; }
    #viewer-drop svg { width: 36px; height: 36px; stroke: #ccc; margin-bottom: 0.75rem; }
    #viewer-drop p { font-size: 0.875rem; color: var(--muted); }
    #viewer-drop a { color: var(--accent); cursor: pointer; text-decoration: underline; text-underline-offset: 2px; }
    #viewer-drop .hint { font-size: 0.75rem; color: #bbb; margin-top: 0.4rem; }

    #log-wrapper {
      flex: 1;
      min-height: 0;
      display: none;
      flex-direction: column;
      padding: 1.25rem;
      gap: 1rem;
    }
    #log-wrapper.visible { display: flex; }

    #paste-section {
      padding: 0 1.25rem 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      flex-shrink: 0;
    }

    /* ── Toolbar ────────────────────────────────── */
    #toolbar {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      flex-wrap: wrap;
      flex-shrink: 0;
    }
    #file-info { font-size: 0.82rem; color: var(--muted); }
    #file-info strong { color: var(--text); }
    #log-type-badge { font-size: 0.7rem; font-weight: 600; padding: 0.2rem 0.55rem; border-radius: 99px; background: #dbeafe; color: #1e40af; }
    .spacer { flex: 1; }
    #search-input { padding: 0.38rem 0.65rem; border: 1px solid var(--border); border-radius: 6px; font-size: 0.82rem; width: 180px; }
    #level-filter { padding: 0.38rem 0.55rem; border: 1px solid var(--border); border-radius: 6px; font-size: 0.82rem; }
    #reset-btn { padding: 0.38rem 0.8rem; border: 1px solid var(--border); border-radius: 6px; background: var(--surface); font-size: 0.82rem; cursor: pointer; }
    #reset-btn:hover { background: var(--bg); }

    /* ── Log output ─────────────────────────────── */
    #log-output { flex: 1; }

    /* ── Divider ────────────────────────────────── */
    .section-divider {
      display: flex; align-items: center; gap: 0.75rem;
      color: #bbb; font-size: 0.78rem; flex-shrink: 0;
    }
    .section-divider::before, .section-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    /* ── Paste panel ────────────────────────────── */
    #paste-panel { flex-shrink: 0; }
    .paste-label { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); margin-bottom: 0.4rem; }
    #paste-textarea {
      width: 100%; min-height: 80px; padding: 0.65rem;
      border: 1px solid var(--border); border-radius: var(--radius);
      font-family: ui-monospace, monospace; font-size: 0.78rem;
      resize: vertical; background: var(--surface); transition: border-color 0.15s;
    }
    #paste-textarea:focus { outline: none; border-color: var(--accent); }
    #paste-result { margin-top: 0.75rem; }

    /* ── Chat log ───────────────────────────────── */
    .session-meta {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 0.9rem 1.1rem;
      display: flex; gap: 1.25rem; flex-wrap: wrap;
    }
    .meta-item { font-size: 0.82rem; }
    .meta-item .label { color: var(--muted); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.05em; }
    .meta-item .value { font-weight: 600; margin-top: 0.1rem; }

    .chat-container { display: flex; flex-direction: column; gap: 0.9rem; }

    .msg-system { background: #f8f8f8; border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    .msg-system-header {
      display: flex; align-items: center; gap: 0.5rem; padding: 0.55rem 0.9rem;
      cursor: pointer; user-select: none; font-size: 0.82rem; color: var(--muted); font-weight: 500;
    }
    .msg-system-header:hover { background: #f0f0f0; }
    .toggle-arrow { transition: transform 0.2s; display: inline-block; font-size: 0.7rem; }
    .msg-system.open .toggle-arrow { transform: rotate(90deg); }
    .msg-system-body {
      display: none; padding: 0.9rem; font-size: 0.78rem; white-space: pre-wrap;
      font-family: ui-monospace, monospace; border-top: 1px solid var(--border);
      max-height: 360px; overflow-y: auto; line-height: 1.5; color: #444;
    }
    .msg-system.open .msg-system-body { display: block; }

    .msg-row { display: flex; gap: 0.65rem; align-items: flex-start; }
    .msg-row.user { flex-direction: row-reverse; }
    .msg-avatar {
      width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.7rem; font-weight: 700; color: #fff;
    }
    .msg-row.user .msg-avatar { background: #1d4ed8; }
    .msg-row.assistant .msg-avatar { background: #059669; }
    .msg-bubble { max-width: 82%; border-radius: var(--radius); overflow: hidden; }
    .msg-row.user .msg-bubble { background: #dbeafe; padding: 0.65rem 0.9rem; }
    .msg-row.assistant .msg-bubble { background: var(--surface); border: 1px solid var(--border); }
    .msg-text { font-size: 0.875rem; line-height: 1.5; }
    .msg-time { font-size: 0.7rem; color: var(--muted); margin-top: 0.3rem; }
    .msg-row.user .msg-time { text-align: right; }

    .mission-header { padding: 0.65rem 0.9rem 0.45rem; border-bottom: 1px solid var(--border); }
    .mission-explanation { font-size: 0.85rem; color: #444; line-height: 1.45; }
    .mission-body { padding: 0.65rem 0.9rem; }
    .mission-commands { display: flex; flex-wrap: wrap; gap: 0.35rem; margin-top: 0.4rem; }
    .cmd-chip { font-size: 0.75rem; font-weight: 600; padding: 0.2rem 0.55rem; border-radius: 99px; white-space: nowrap; }
    .cmd-arm     { background: #fff7ed; color: #c2410c; border: 1px solid #fed7aa; }
    .cmd-takeoff { background: #f0fdf4; color: #15803d; border: 1px solid #bbf7d0; }
    .cmd-land    { background: #fef2f2; color: #b91c1c; border: 1px solid #fecaca; }
    .cmd-goto    { background: #eff6ff; color: #1d4ed8; border: 1px solid #bfdbfe; }
    .cmd-forward { background: #f5f3ff; color: #6d28d9; border: 1px solid #ddd6fe; }
    .cmd-turn    { background: #fdf4ff; color: #a21caf; border: 1px solid #f5d0fe; }
    .cmd-return  { background: #fffbeb; color: #b45309; border: 1px solid #fde68a; }
    .cmd-fly     { background: #ecfdf5; color: #047857; border: 1px solid #a7f3d0; }
    .cmd-other   { background: #f8f8f8; color: #444; border: 1px solid var(--border); }
    .rep-badge   { font-size: 0.72rem; color: var(--muted); margin-top: 0.35rem; }

    /* ── Text/mavros log ────────────────────────── */
    .log-list {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); overflow: hidden;
      font-family: ui-monospace, 'Cascadia Code', monospace; font-size: 0.78rem;
    }
    .log-line {
      display: flex; align-items: baseline; gap: 0.45rem;
      padding: 0.28rem 0.7rem; line-height: 1.4; border-bottom: 1px solid #f0f0f0;
    }
    .log-line:last-child { border-bottom: none; }
    .log-line:hover { background: #fafafa; }
    .log-line.hidden { display: none; }
    .log-line.is-pipeline-line { background: #fefce8; }
    .log-line.is-pipeline-line:hover { background: #fef9c3; }
    .log-time { color: #999; flex-shrink: 0; font-size: 0.72rem; }
    .log-level-badge {
      font-size: 0.68rem; font-weight: 700; padding: 0.04rem 0.4rem;
      border-radius: 4px; flex-shrink: 0; letter-spacing: 0.03em;
    }
    .lvl-info  { background: #dbeafe; color: #1e40af; }
    .lvl-warn  { background: #fef3c7; color: #92400e; }
    .lvl-error { background: #fee2e2; color: #991b1b; }
    .lvl-debug { background: #f3e8ff; color: #5b21b6; }
    .lvl-other { background: #f3f4f6; color: #374151; }
    .log-source { color: #888; flex-shrink: 0; }
    .log-msg { color: var(--text); flex: 1; white-space: pre-wrap; word-break: break-all; }
    .log-msg .highlight { background: #fef08a; border-radius: 2px; }
    .log-count { font-size: 0.78rem; color: var(--muted); }
    .empty-msg { text-align: center; padding: 2rem; color: var(--muted); font-size: 0.875rem; }

    /* ── Pipeline section (in-log) ──────────────── */
    .pipeline-section {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); overflow: hidden;
    }
    .pipeline-section-hdr {
      display: flex; align-items: center; gap: 0.65rem;
      padding: 0.65rem 0.9rem; cursor: pointer; user-select: none;
      border-bottom: 1px solid var(--border); background: #fefce8;
    }
    .pipeline-section-hdr:hover { background: #fef9c3; }
    .pipeline-section-title { font-size: 0.875rem; font-weight: 600; }
    .pipeline-section-body { display: none; padding: 0.9rem; display: flex; flex-direction: column; gap: 0.9rem; }

    /* ── Pipeline card ──────────────────────────── */
    .pipeline-card { border: 1px solid var(--border); border-radius: 7px; overflow: hidden; }
    .pipeline-card-hdr {
      display: flex; align-items: center; gap: 0.65rem; flex-wrap: wrap;
      padding: 0.65rem 0.9rem; background: #f8fafc; border-bottom: 1px solid var(--border);
    }
    .pipeline-status {
      font-size: 0.7rem; font-weight: 700; padding: 0.18rem 0.55rem;
      border-radius: 99px; text-transform: uppercase; letter-spacing: 0.05em;
    }
    .status-success { background: #dcfce7; color: #15803d; }
    .status-aborted { background: #fef3c7; color: #92400e; }
    .status-failed  { background: #fee2e2; color: #991b1b; }
    .status-unknown { background: #f3f4f6; color: #374151; }
    .pipeline-meta-pill { font-size: 0.75rem; color: var(--muted); background: #f1f5f9; border-radius: 99px; padding: 0.12rem 0.55rem; }
    .pipeline-total { margin-left: auto; font-size: 0.82rem; font-weight: 600; }

    .pipeline-timeline { padding: 0.9rem; }
    .tl-controls { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.65rem; }
    .tl-controls-label { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
    .tl-scale-btns { display: flex; border: 1px solid var(--border); border-radius: 5px; overflow: hidden; }
    .tl-scale-btn {
      padding: 0.18rem 0.55rem; font-size: 0.72rem; border: none;
      background: var(--surface); cursor: pointer; color: var(--muted);
    }
    .tl-scale-btn + .tl-scale-btn { border-left: 1px solid var(--border); }
    .tl-scale-btn.active { background: #1d4ed8; color: #fff; }

    .tl-rows { display: flex; flex-direction: column; gap: 4px; }
    .tl-row { display: flex; align-items: center; gap: 7px; }
    .tl-label { width: 175px; flex-shrink: 0; font-size: 0.72rem; color: var(--muted); text-align: right; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .tl-bar-area { flex: 1; height: 18px; background: #f1f5f9; border-radius: 4px; position: relative; overflow: hidden; }
    .tl-bar { position: absolute; height: 100%; border-radius: 4px; transition: left 0.25s, width 0.25s; }
    .tl-val { width: 95px; flex-shrink: 0; font-size: 0.7rem; color: var(--muted); }

    .pipeline-table-toggle {
      display: flex; align-items: center; gap: 0.45rem;
      padding: 0.5rem 0.9rem; cursor: pointer; user-select: none;
      font-size: 0.78rem; color: var(--muted); border-top: 1px solid var(--border); background: #f8fafc;
    }
    .pipeline-table-toggle:hover { background: #f1f5f9; }
    .pipeline-stage-table { display: none; width: 100%; border-collapse: collapse; font-size: 0.78rem; border-top: 1px solid var(--border); }
    .pipeline-stage-table.open { display: table; }
    .pipeline-stage-table th { text-align: left; padding: 0.38rem 0.7rem; font-size: 0.7rem; color: var(--muted); background: #f8fafc; text-transform: uppercase; letter-spacing: 0.04em; }
    .pipeline-stage-table td { padding: 0.32rem 0.7rem; border-top: 1px solid #f0f0f0; }
    .pipeline-stage-table tr:hover td { background: #fafafa; }
    .td-dur { font-weight: 600; font-family: ui-monospace, monospace; }
    .td-pct { color: var(--muted); }
    .td-slow { color: #d97706; }

    footer { padding: 1rem 1.25rem; color: #aaa; font-size: 0.78rem; flex-shrink: 0; }
    footer a { color: #888; }
  </style>
</head>
<body>

<header>
  <a href="index.html">← HTML Tools</a>
  <span class="sep">/</span>
  <h1>Drone Log Viewer</h1>
</header>

<div id="app">

  <!-- ── Sidebar ──────────────────────────────── -->
  <aside id="sidebar">
    <div id="sidebar-top">
      <div id="sidebar-top-btns">
        <button id="open-folder-btn">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
          Open Logs Folder
        </button>
        <button id="refresh-btn" title="Reload folder">↺</button>
      </div>
      <input type="file" id="folder-input" webkitdirectory multiple />
      <input type="file" id="file-input" accept=".jsonl,.log,.txt" />
      <a id="open-file-link">↑ Open single file…</a>
      <input type="text" id="sidebar-search" placeholder="Filter files…" autocomplete="off" />
    </div>

    <div id="sidebar-drop">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
      </svg>
      <span>Drop a folder here<br>or click <em>Open Logs Folder</em></span>
    </div>

    <div id="file-tree"></div>
  </aside>

  <!-- ── Viewer panel ──────────────────────────── -->
  <div id="viewer-panel">

    <div id="welcome">
      <div id="viewer-drop">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 16v1a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-1"/>
          <polyline points="8 12 12 8 16 12"/>
          <line x1="12" y1="8" x2="12" y2="20"/>
        </svg>
        <p><strong>Drop a log file here</strong> or <a id="browse-file-link">browse</a></p>
        <p class="hint">or use the sidebar to browse a logs folder</p>
      </div>
    </div>

    <div id="log-wrapper">
      <div id="toolbar">
        <div id="file-info"></div>
        <span id="log-type-badge"></span>
        <div class="spacer"></div>
        <input type="text" id="search-input" placeholder="Search…" autocomplete="off" />
        <select id="level-filter"><option value="">All levels</option></select>
      </div>

      <div id="log-output"></div>
    </div>

    <div id="paste-section">
      <div class="section-divider">Pipeline Profiler</div>
      <div id="paste-panel">
        <p class="paste-label">Paste a pipeline_stages line or fragment</p>
        <textarea id="paste-textarea" spellcheck="false"
          placeholder="final_status=aborted stages=[{&quot;name&quot;: &quot;ingress_received&quot;, &quot;started_at&quot;: &quot;...&quot;, &quot;duration_ms&quot;: 0.016}, ...]"></textarea>
        <div id="paste-result"></div>
      </div>
    </div>

    <footer><a href="index.html">← Back to tools</a></footer>
  </div>

</div>

<script>
(function () {
  'use strict';

  /* ── DOM refs ─────────────────────────────────────── */
  const openFolderBtn  = document.getElementById('open-folder-btn');
  const refreshBtn     = document.getElementById('refresh-btn');
  const openFileLink   = document.getElementById('open-file-link');
  const folderInput    = document.getElementById('folder-input');
  const fileInput      = document.getElementById('file-input');
  const sidebarDrop    = document.getElementById('sidebar-drop');
  const sidebarSearch  = document.getElementById('sidebar-search');
  const fileTree       = document.getElementById('file-tree');
  const welcome        = document.getElementById('welcome');
  const viewerDrop     = document.getElementById('viewer-drop');
  const browseFileLink = document.getElementById('browse-file-link');
  const logWrapper     = document.getElementById('log-wrapper');
  const fileInfo       = document.getElementById('file-info');
  const typeBadge      = document.getElementById('log-type-badge');
  const searchInput    = document.getElementById('search-input');
  const levelFilter    = document.getElementById('level-filter');
  const logOutput      = document.getElementById('log-output');
  const pasteTA        = document.getElementById('paste-textarea');
  const pasteResult    = document.getElementById('paste-result');

  /* ── State ────────────────────────────────────────── */
  let folderFiles  = [];   // Array of { file, relativePath, meta, text? }
  let selectedPath = null;
  const textCache  = {};   // relativePath → full text
  let lastDirHandle = null; // for refresh via showDirectoryPicker
  let lastItems     = null; // for refresh via webkitdirectory / drop

  /* ══════════════════════════════════════════════════
     FOLDER LOADING
  ══════════════════════════════════════════════════ */
  openFolderBtn.addEventListener('click', async () => {
    if ('showDirectoryPicker' in window) {
      try {
        const handle = await window.showDirectoryPicker({ mode: 'read' });
        lastDirHandle = handle;
        lastItems = null;
        const items = await collectFromHandle(handle, handle.name + '/');
        await processItems(items);
      } catch (e) {
        if (e.name !== 'AbortError') folderInput.click();
      }
    } else {
      folderInput.click();
    }
  });

  folderInput.addEventListener('change', () => {
    if (!folderInput.files.length) return;
    const items = Array.from(folderInput.files).map(f => ({
      file: f,
      relativePath: f.webkitRelativePath || f.name,
    }));
    lastDirHandle = null;
    lastItems = items;
    processItems(items);
  });

  /* ── Refresh ─────────────────────────────────────── */
  refreshBtn.addEventListener('click', async () => {
    refreshBtn.classList.add('spinning');
    try {
      if (lastDirHandle) {
        const items = await collectFromHandle(lastDirHandle, lastDirHandle.name + '/');
        await processItems(items, /* keepSelected */ true);
      } else if (lastItems) {
        await processItems(lastItems, /* keepSelected */ true);
      }
    } finally {
      refreshBtn.classList.remove('spinning');
    }
  });

  /* ── Single file ─────────────────────────────────── */
  openFileLink.addEventListener('click', () => fileInput.click());
  browseFileLink.addEventListener('click', () => fileInput.click());

  fileInput.addEventListener('change', () => {
    if (!fileInput.files[0]) return;
    loadSingleFile(fileInput.files[0]);
    fileInput.value = '';
  });

  viewerDrop.addEventListener('dragover', (e) => {
    if (e.dataTransfer.types.includes('Files')) { e.preventDefault(); viewerDrop.classList.add('drag-over'); }
  });
  viewerDrop.addEventListener('dragleave', () => viewerDrop.classList.remove('drag-over'));
  viewerDrop.addEventListener('drop', async (e) => {
    e.preventDefault();
    viewerDrop.classList.remove('drag-over');
    const item = e.dataTransfer.items[0];
    if (!item || item.kind !== 'file') return;
    const entry = item.webkitGetAsEntry?.();
    if (entry?.isDirectory) {
      // Folder dropped on viewer → hand off to sidebar logic
      const items = [];
      await collectFromEntry(entry, entry.name + '/', items);
      lastDirHandle = null;
      lastItems = items;
      await processItems(items);
    } else {
      loadSingleFile(item.getAsFile());
    }
  });

  function loadSingleFile(file) {
    const reader = new FileReader();
    reader.onload = (e) => renderLog(file.name, e.target.result);
    reader.readAsText(file);
  }

  /* Folder drag-and-drop on sidebar */
  const sidebar = document.getElementById('sidebar');
  sidebar.addEventListener('dragover', (e) => {
    if (e.dataTransfer.types.includes('Files')) {
      e.preventDefault();
      sidebarDrop.classList.add('drag-over');
    }
  });
  sidebar.addEventListener('dragleave', () => sidebarDrop.classList.remove('drag-over'));
  sidebar.addEventListener('drop', async (e) => {
    e.preventDefault();
    sidebarDrop.classList.remove('drag-over');
    const items = [];
    for (const dataItem of e.dataTransfer.items) {
      if (dataItem.kind === 'file') {
        const entry = dataItem.webkitGetAsEntry?.();
        if (entry?.isDirectory) {
          await collectFromEntry(entry, entry.name + '/', items);
        } else if (entry?.isFile) {
          const file = dataItem.getAsFile();
          items.push({ file, relativePath: file.name });
        }
      }
    }
    if (items.length) {
      lastDirHandle = null;
      lastItems = items;
      processItems(items);
    }
  });

  async function collectFromHandle(handle, pathPrefix) {
    const items = [];
    for await (const entry of handle.values()) {
      if (entry.kind === 'file') {
        const file = await entry.getFile();
        items.push({ file, relativePath: pathPrefix + entry.name });
      } else if (entry.kind === 'directory') {
        const sub = await collectFromHandle(entry, pathPrefix + entry.name + '/');
        items.push(...sub);
      }
    }
    return items;
  }

  function collectFromEntry(entry, pathPrefix, results) {
    return new Promise(resolve => {
      if (entry.isFile) {
        entry.file(file => {
          results.push({ file, relativePath: pathPrefix + entry.name });
          resolve();
        });
      } else if (entry.isDirectory) {
        const reader = entry.createReader();
        reader.readEntries(async entries => {
          for (const sub of entries) await collectFromEntry(sub, pathPrefix + entry.name + '/', results);
          resolve();
        });
      } else resolve();
    });
  }

  /* ── processItems: scan & build sidebar ──────────── */
  async function processItems(items, keepSelected = false) {
    const filtered = items.filter(({ relativePath }) => {
      const name = relativePath.split('/').pop();
      return !name.startsWith('.') && /\.(log|jsonl|txt)$/i.test(name);
    });

    if (!keepSelected) selectedPath = null;
    folderFiles = [];
    fileTree.innerHTML = '';
    sidebarDrop.style.display = 'none';
    fileTree.classList.add('visible');
    sidebarSearch.classList.add('visible');
    refreshBtn.classList.add('visible');
    openFileLink.classList.add('visible');

    // Show placeholder items first, then scan metadata in batches
    const placeholders = filtered.map(item => ({ ...item, meta: null }));
    folderFiles = placeholders;
    renderFileTree(folderFiles);

    const BATCH = 8;
    for (let i = 0; i < filtered.length; i += BATCH) {
      const batch = filtered.slice(i, i + BATCH);
      await Promise.all(batch.map(async item => {
        const idx = folderFiles.findIndex(f => f.relativePath === item.relativePath);
        const scanned = await scanFileMeta(item);
        folderFiles[idx] = scanned;
      }));
      renderFileTree(folderFiles);
      await tick();
    }
  }

  /* ── Metadata scan ───────────────────────────────── */
  const MAX_FULL = 1.5 * 1024 * 1024; // 1.5 MB — read full for metadata+cache

  async function scanFileMeta({ file, relativePath }) {
    const name = relativePath.split('/').pop();
    const small = file.size <= MAX_FULL;
    let text;
    try {
      // For type detection + pipeline counting we need enough of the file.
      // Always read full for small files; for large files read 8KB header.
      const blob = small ? file : file.slice(0, 8192);
      text = await readBlob(blob);
    } catch (_) {
      return { file, relativePath, meta: { name, type: 'UNKNOWN', error: true } };
    }

    const type = detectType(name, text);
    const meta = { name, type, fileSize: file.size, partial: !small };

    if (type === 'CHAT_JSONL' && small) {
      const lines = text.trim().split('\n');
      try {
        const hdr = JSON.parse(lines[0]);
        meta.uav_id     = hdr.uav_id;
        meta.model_name = hdr.model_name;
        meta.session_id = hdr.session_id;
        meta.start_time = hdr.start_time;
      } catch (_) {}
      meta.msg_count = lines.filter(l => {
        try { return JSON.parse(l).role === 'user'; } catch (_) { return false; }
      }).length;

    } else if (type === 'TEXT_LOG') {
      meta.pipeline_count = (text.match(/\bpipeline_stages\b/g) || []).length;
      const mpM = text.match(/\[(\w+)\.mission_planner_node\]/);
      if (mpM) { meta.uav_id = mpM[1]; meta.process_type = 'mission_planner'; }
      const fsM = text.match(/fleet_snapshot_node/);
      if (fsM) meta.process_type = 'fleet_snapshot';
      const ts = [...text.matchAll(/\[(\d{2}:\d{2}:\d{2})/g)];
      if (ts.length) { meta.first_time = ts[0][1]; meta.last_time = ts[ts.length - 1][1]; }

    } else if (type === 'MAVROS_LOG') {
      const nodeM = text.match(/\[(\w+\.mavros[\w_]*)\]/);
      if (nodeM) meta.node = nodeM[1];
    }

    if (small) textCache[relativePath] = text;
    return { file, relativePath, meta };
  }

  /* ══════════════════════════════════════════════════
     SIDEBAR RENDERING
  ══════════════════════════════════════════════════ */
  let searchQ = '';
  sidebarSearch.addEventListener('input', () => {
    searchQ = sidebarSearch.value.toLowerCase().trim();
    renderFileTree(folderFiles);
  });

  function renderFileTree(files) {
    // Group by directory (second path segment)
    const groups = {};
    for (const f of files) {
      const parts = f.relativePath.split('/');
      // parts[0] is the root folder name, parts[1] (if exists) is subdir
      const dir = parts.length > 2 ? parts[1] : '__root__';
      if (!groups[dir]) groups[dir] = [];
      groups[dir].push(f);
    }

    // Sort group keys: root first, then alphabetical
    const keys = Object.keys(groups).sort((a, b) =>
      a === '__root__' ? -1 : b === '__root__' ? 1 : a.localeCompare(b)
    );

    // Apply search filter
    const filterFile = (f) => {
      if (!searchQ) return true;
      return f.relativePath.toLowerCase().includes(searchQ) ||
        (f.meta?.uav_id || '').toLowerCase().includes(searchQ) ||
        (f.meta?.model_name || '').toLowerCase().includes(searchQ) ||
        (f.meta?.process_type || '').toLowerCase().includes(searchQ);
    };

    fileTree.innerHTML = '';
    for (const key of keys) {
      const filesInGroup = groups[key].filter(filterFile);
      if (!filesInGroup.length) continue;

      // Sort newest first (extract YYYYMMDD_HHMMSS from name)
      filesInGroup.sort((a, b) => {
        const ta = extractTimestamp(a.meta?.name || a.relativePath);
        const tb = extractTimestamp(b.meta?.name || b.relativePath);
        return tb.localeCompare(ta);
      });

      const group = document.createElement('div');
      group.className = 'folder-group';

      const hdr = document.createElement('div');
      hdr.className = 'folder-group-hdr';
      const label = key === '__root__' ? 'Session Logs' : key;
      hdr.innerHTML = `<span class="fg-arrow">▾</span><span>${escHtml(label)}</span><span class="fg-count">${filesInGroup.length}</span>`;
      group.appendChild(hdr);

      const body = document.createElement('div');
      body.className = 'folder-group-body';
      for (const f of filesInGroup) body.appendChild(buildFileItem(f));
      group.appendChild(body);

      hdr.addEventListener('click', () => {
        const collapsed = body.classList.toggle('collapsed');
        hdr.classList.toggle('collapsed', collapsed);
      });

      fileTree.appendChild(group);
    }
  }

  function buildFileItem(f) {
    const el = document.createElement('div');
    el.className = 'file-item' + (f.relativePath === selectedPath ? ' selected' : '');
    el.dataset.path = f.relativePath;

    const { meta } = f;
    const name = meta?.name || f.relativePath.split('/').pop();
    const parsed = parseFilename(name);

    // Row 1: type badge + display name
    const typeBadgeStr = meta ? fileTypeBadge(meta) : '<span class="type-badge tb-unknown">…</span>';
    const displayName = parsed
      ? `${parsed.month}/${parsed.day} ${parsed.hh}:${parsed.mm}`
      : escHtml(name);

    // Row 2: metadata tags
    const tags = [];
    if (meta) {
      if (meta.uav_id)     tags.push(`<span class="fi-tag">${escHtml(meta.uav_id)}</span>`);
      if (meta.model_name) tags.push(`<span class="fi-tag">${escHtml(meta.model_name)}</span>`);
      if (meta.process_type) tags.push(`<span class="fi-tag">${escHtml(meta.process_type.replace('_', ' '))}</span>`);
      if (meta.node)       tags.push(`<span class="fi-tag">${escHtml(meta.node)}</span>`);
      if (meta.msg_count !== undefined)
        tags.push(`<span class="fi-tag">${meta.msg_count} msg${meta.msg_count !== 1 ? 's' : ''}</span>`);
      if (meta.pipeline_count)
        tags.push(`<span class="fi-tag pipeline-tag">⬡ ${meta.pipeline_count} pipeline${meta.pipeline_count !== 1 ? 's' : ''}</span>`);
      if (meta.first_time && meta.last_time && meta.first_time !== meta.last_time)
        tags.push(`<span class="fi-tag">${escHtml(meta.first_time)}–${escHtml(meta.last_time)}</span>`);
      if (meta.partial)
        tags.push(`<span class="fi-tag">${fmtBytes(meta.fileSize)}</span>`);
    } else {
      tags.push('<span class="fi-scanning">scanning…</span>');
    }

    el.innerHTML = `
      <div class="fi-row1">${typeBadgeStr}<span class="fi-name" title="${escHtml(name)}">${displayName}</span></div>
      <div class="fi-row2">${tags.join('<span class="fi-dot">·</span>')}</div>
    `;
    el.addEventListener('click', () => selectFile(f));
    return el;
  }

  function fileTypeBadge(meta) {
    if (meta.type === 'CHAT_JSONL')  return '<span class="type-badge tb-chat">Chat</span>';
    if (meta.type === 'MAVROS_LOG')  return '<span class="type-badge tb-mavros">MAVROS</span>';
    if (meta.type === 'TEXT_LOG') {
      if (meta.process_type === 'fleet_snapshot') return '<span class="type-badge tb-fleet">Fleet</span>';
      return '<span class="type-badge tb-log">Log</span>';
    }
    return '<span class="type-badge tb-unknown">?</span>';
  }

  function parseFilename(name) {
    const m = name.match(/^(\d{4})(\d{2})(\d{2})_(\d{2})(\d{2})(\d{2})/);
    if (!m) return null;
    return { year: m[1], month: m[2], day: m[3], hh: m[4], mm: m[5], ss: m[6] };
  }

  function extractTimestamp(name) {
    const m = name.match(/^(\d{8}_\d{6})/);
    return m ? m[1] : name;
  }

  /* ── File selection ──────────────────────────────── */
  async function selectFile(f) {
    selectedPath = f.relativePath;

    // Update sidebar highlight
    document.querySelectorAll('.file-item').forEach(el => {
      el.classList.toggle('selected', el.dataset.path === selectedPath);
    });

    // Get full text
    let text = textCache[f.relativePath];
    if (!text) {
      try {
        text = await readBlob(f.file);
        textCache[f.relativePath] = text;
      } catch (e) {
        showError('Failed to read file: ' + e.message);
        return;
      }
    }

    renderLog(f.meta?.name || f.relativePath.split('/').pop(), text);
  }

  /* ══════════════════════════════════════════════════
     LOG RENDERING (unchanged from before)
  ══════════════════════════════════════════════════ */
  function renderLog(name, text) {
    welcome.style.display  = 'none';
    logWrapper.classList.add('visible');
    logOutput.innerHTML = '';
    pasteResult.innerHTML = '';
    pasteTA.value = '';
    levelFilter.innerHTML = '<option value="">All levels</option>';

    const type = detectType(name, text);
    typeBadge.textContent = ({
      CHAT_JSONL: 'Chat JSONL',
      TEXT_LOG:   'Mission / System Log',
      MAVROS_LOG: 'MAVROS Log',
    })[type] || type;

    const bytes = text.length;
    fileInfo.innerHTML = `<strong>${escHtml(name)}</strong> &nbsp;${fmtBytes(bytes)}`;

    if (type === 'CHAT_JSONL') {
      searchInput.style.display = 'none';
      levelFilter.style.display = 'none';
      renderChatJsonl(text);
    } else if (type === 'MAVROS_LOG') {
      searchInput.style.display = '';
      levelFilter.style.display = '';
      renderMavrosLog(text);
    } else {
      searchInput.style.display = '';
      levelFilter.style.display = '';
      renderTextLog(text);
    }
  }

  function showError(msg) {
    welcome.style.display = 'none';
    logWrapper.classList.add('visible');
    logOutput.innerHTML = `<p class="empty-msg" style="color:#dc2626">${escHtml(msg)}</p>`;
  }

  /* ── Log type detection ──────────────────────────── */
  function detectType(name, text) {
    if (name.endsWith('.jsonl')) return 'CHAT_JSONL';
    const first = text.split('\n')[0].trim();
    try { const o = JSON.parse(first); if (o.session_id || o.role) return 'CHAT_JSONL'; } catch (_) {}
    if (/^\[(?:INFO|WARN|ERROR|DEBUG|FATAL)\]\s*\[\d{10,}\]/.test(first)) return 'MAVROS_LOG';
    return 'TEXT_LOG';
  }

  /* ══════════════════════════════════════════════════
     PIPELINE PARSING
  ══════════════════════════════════════════════════ */
  const STAGE_COLORS = [
    '#60a5fa','#34d399','#f97316','#a78bfa','#fb7185',
    '#fbbf24','#38bdf8','#4ade80','#c084fc','#f472b6',
    '#2dd4bf','#fb923c','#94a3b8','#e879f9','#86efac',
  ];

  function extractStagesJson(text) {
    const marker = 'stages=[';
    const idx = text.indexOf(marker);
    if (idx === -1) return null;
    let start = idx + marker.length - 1;
    let depth = 0, inStr = false, esc = false;
    for (let i = start; i < text.length; i++) {
      const c = text[i];
      if (esc) { esc = false; continue; }
      if (c === '\\' && inStr) { esc = true; continue; }
      if (c === '"') { inStr = !inStr; continue; }
      if (!inStr) {
        if (c === '[' || c === '{') depth++;
        else if (c === ']' || c === '}') { depth--; if (depth === 0) return text.slice(start, i + 1); }
      }
    }
    return null;
  }

  function parsePipelineText(text) {
    const stagesJson = extractStagesJson(text);
    if (!stagesJson) return null;
    let stages;
    try { stages = JSON.parse(stagesJson); } catch (_) { return null; }
    if (!Array.isArray(stages) || !stages.length) return null;
    const result = { stages };
    const re = /\b(pipeline_id|target_uav|final_status|total_duration_ms)=([^\s\[{,\]]+)/g;
    let m;
    while ((m = re.exec(text)) !== null) result[m[1]] = m[2];
    return result;
  }

  function parsePipelineFromLogMsg(source, msg) {
    if (source !== 'pipeline_profile') return null;
    if (!msg.startsWith('pipeline_stages')) return null;
    return parsePipelineText(msg);
  }

  function buildPipelineCard(data) {
    const { stages, pipeline_id, target_uav, final_status, total_duration_ms } = data;
    const startTimes = stages.map(s => new Date(s.started_at).getTime());
    const endTimes   = stages.map((s, i) => startTimes[i] + s.duration_ms);
    const tMin = Math.min(...startTimes);
    const tMax = Math.max(...endTimes);
    const totalSpan = tMax - tMin || 1;
    const totalDur = total_duration_ms
      ? parseFloat(total_duration_ms)
      : stages.reduce((a, s) => a + s.duration_ms, 0);
    const maxDur = Math.max(...stages.map(s => s.duration_ms));

    const statusKey = (final_status || 'unknown').toLowerCase();
    const statusClass = { success:'status-success', aborted:'status-aborted', failed:'status-failed' }[statusKey] || 'status-unknown';
    const statusLabel = { success:'✓ Success', aborted:'⚠ Aborted', failed:'✗ Failed' }[statusKey] || (final_status || 'Unknown');

    const card = document.createElement('div');
    card.className = 'pipeline-card';
    card.innerHTML = `<div class="pipeline-card-hdr">
      <span class="pipeline-status ${statusClass}">${escHtml(statusLabel)}</span>
      ${pipeline_id ? `<span class="pipeline-meta-pill" title="${escHtml(pipeline_id)}">ID: ${escHtml(pipeline_id.slice(0,8))}…</span>` : ''}
      ${target_uav  ? `<span class="pipeline-meta-pill">UAV: ${escHtml(target_uav)}</span>` : ''}
      <span class="pipeline-meta-pill">${stages.length} stages</span>
      <span class="pipeline-total">${fmtMs(totalDur)} total</span>
    </div>`;

    const tlDiv = document.createElement('div');
    tlDiv.className = 'pipeline-timeline';
    tlDiv.innerHTML = `<div class="tl-controls">
      <span class="tl-controls-label">Timeline</span>
      <div class="tl-scale-btns">
        <button class="tl-scale-btn active" data-scale="linear">Linear</button>
        <button class="tl-scale-btn" data-scale="log">Log scale</button>
      </div>
    </div><div class="tl-rows"></div>`;

    const rowsDiv = tlDiv.querySelector('.tl-rows');

    function buildRows(useLog) {
      rowsDiv.innerHTML = '';
      stages.forEach((stage, i) => {
        const color = STAGE_COLORS[i % STAGE_COLORS.length];
        let leftPct, widthPct;
        if (useLog) {
          leftPct = 0;
          widthPct = Math.log(1 + stage.duration_ms) / Math.log(1 + maxDur) * 100;
        } else {
          const t = new Date(stage.started_at).getTime();
          leftPct  = (t - tMin) / totalSpan * 100;
          widthPct = stage.duration_ms / totalSpan * 100;
        }
        widthPct = Math.max(widthPct, 0.3);
        const pct = (stage.duration_ms / totalDur * 100).toFixed(1);
        const slow = parseFloat(pct) >= 20;
        const row = document.createElement('div');
        row.className = 'tl-row';
        row.innerHTML = `
          <span class="tl-label" title="${escHtml(stage.name)}">${escHtml(stage.name)}</span>
          <div class="tl-bar-area"><div class="tl-bar" style="left:${leftPct.toFixed(2)}%;width:${widthPct.toFixed(2)}%;background:${color};opacity:0.85"></div></div>
          <span class="tl-val ${slow ? 'td-slow' : ''}">${fmtMs(stage.duration_ms)} <span style="opacity:0.6">${pct}%</span></span>`;
        rowsDiv.appendChild(row);
      });
    }
    buildRows(false);
    tlDiv.querySelectorAll('.tl-scale-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        tlDiv.querySelectorAll('.tl-scale-btn').forEach(b => b.classList.toggle('active', b === btn));
        buildRows(btn.dataset.scale === 'log');
      });
    });
    card.appendChild(tlDiv);

    const tableToggle = document.createElement('div');
    tableToggle.className = 'pipeline-table-toggle';
    tableToggle.innerHTML = '<span class="toggle-arrow">▶</span> Stage details';
    const table = document.createElement('table');
    table.className = 'pipeline-stage-table';
    table.innerHTML = `<thead><tr><th>#</th><th>Stage</th><th>Start offset</th><th>Duration</th><th>%</th></tr></thead><tbody></tbody>`;
    const tbody = table.querySelector('tbody');
    stages.forEach((stage, i) => {
      const offset = new Date(stage.started_at).getTime() - tMin;
      const pct = (stage.duration_ms / totalDur * 100).toFixed(1);
      const slow = parseFloat(pct) >= 20;
      const tr = document.createElement('tr');
      tr.innerHTML = `<td style="color:#aaa">${i + 1}</td>
        <td>${escHtml(stage.name)}</td>
        <td class="td-dur">+${fmtMs(offset)}</td>
        <td class="td-dur ${slow ? 'td-slow' : ''}">${fmtMs(stage.duration_ms)}</td>
        <td class="td-pct ${slow ? 'td-slow' : ''}">${pct}%</td>`;
      tbody.appendChild(tr);
    });
    tableToggle.addEventListener('click', () => {
      const open = table.classList.toggle('open');
      tableToggle.querySelector('.toggle-arrow').style.transform = open ? 'rotate(90deg)' : '';
    });
    card.appendChild(tableToggle);
    card.appendChild(table);
    return card;
  }

  /* ══════════════════════════════════════════════════
     CHAT JSONL
  ══════════════════════════════════════════════════ */
  function renderChatJsonl(text) {
    const lines = text.trim().split('\n').filter(l => l.trim());
    if (!lines.length) { logOutput.innerHTML = '<p class="empty-msg">Empty file.</p>'; return; }

    let sessionMeta = null;
    const messages = [];
    for (const line of lines) {
      let obj; try { obj = JSON.parse(line); } catch (_) { continue; }
      if (obj.session_id) { sessionMeta = obj; continue; }
      if (obj.role) messages.push(obj);
    }

    const container = document.createElement('div');
    container.style.display = 'flex';
    container.style.flexDirection = 'column';
    container.style.gap = '0.9rem';

    if (sessionMeta) {
      const meta = document.createElement('div');
      meta.className = 'session-meta';
      meta.innerHTML = [
        ['Session', sessionMeta.session_id],
        ['UAV', sessionMeta.uav_id],
        ['Model', sessionMeta.model_name],
        ['Temperature', sessionMeta.temperature],
        ['Started', sessionMeta.start_time ? fmtDatetime(sessionMeta.start_time) : '—'],
      ].map(([l, v]) => `<div class="meta-item"><div class="label">${l}</div><div class="value">${escHtml(String(v ?? '—'))}</div></div>`).join('');
      container.appendChild(meta);
    }

    const chat = document.createElement('div');
    chat.className = 'chat-container';
    for (const msg of messages) chat.appendChild(buildMessageEl(msg));
    container.appendChild(chat);
    logOutput.appendChild(container);
  }

  function buildMessageEl({ role, content, timestamp }) {
    if (role === 'system') {
      const wrap = document.createElement('div');
      wrap.className = 'msg-system';
      wrap.innerHTML = `<div class="msg-system-header"><span class="toggle-arrow">▶</span><span>System Prompt</span><span style="margin-left:auto;font-size:0.7rem;color:#aaa">${timestamp ? fmtTime(timestamp) : ''}</span></div><div class="msg-system-body">${escHtml(typeof content === 'string' ? content : JSON.stringify(content, null, 2))}</div>`;
      wrap.querySelector('.msg-system-header').addEventListener('click', () => wrap.classList.toggle('open'));
      return wrap;
    }
    const row = document.createElement('div');
    row.className = `msg-row ${role}`;
    const avatar = document.createElement('div');
    avatar.className = 'msg-avatar';
    avatar.textContent = role === 'user' ? 'U' : 'AI';
    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    if (role === 'user') {
      bubble.innerHTML = `<div class="msg-text">${escHtml(typeof content === 'string' ? content : JSON.stringify(content))}</div>${timestamp ? `<div class="msg-time">${fmtTime(timestamp)}</div>` : ''}`;
    } else {
      if (typeof content === 'string') {
        let parsed = null; try { parsed = JSON.parse(content); } catch (_) {}
        if (parsed && (parsed.mission || parsed.explanation)) bubble.appendChild(buildMissionEl(parsed, timestamp));
        else bubble.innerHTML = `<div style="padding:0.65rem 0.9rem"><div class="msg-text">${escHtml(content)}</div>${timestamp ? `<div class="msg-time">${fmtTime(timestamp)}</div>` : ''}</div>`;
      } else if (content && typeof content === 'object') {
        bubble.appendChild(buildMissionEl(content, timestamp));
      } else {
        bubble.innerHTML = `<div style="padding:0.65rem 0.9rem"><div class="msg-text">${escHtml(JSON.stringify(content))}</div></div>`;
      }
    }
    row.appendChild(avatar);
    row.appendChild(bubble);
    return row;
  }

  function buildMissionEl({ explanation, mission = [], repetition_count = 1 }, timestamp) {
    const wrap = document.createElement('div');
    if (explanation) {
      const hdr = document.createElement('div');
      hdr.className = 'mission-header';
      hdr.innerHTML = `<div class="mission-explanation">${escHtml(explanation)}</div>${timestamp ? `<div class="msg-time">${fmtTime(timestamp)}</div>` : ''}`;
      wrap.appendChild(hdr);
    }
    if (mission.length) {
      const body = document.createElement('div');
      body.className = 'mission-body';
      body.innerHTML = `<div style="font-size:0.7rem;color:#888;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:0.35rem;">Mission (${mission.length})</div>`;
      const chips = document.createElement('div');
      chips.className = 'mission-commands';
      for (const cmd of mission) {
        const el = document.createElement('span');
        el.className = `cmd-chip ${cmdClass(cmd.type)}`;
        el.title = JSON.stringify(cmd);
        el.textContent = fmtCmd(cmd);
        chips.appendChild(el);
      }
      body.appendChild(chips);
      if (repetition_count > 1) {
        const rep = document.createElement('div');
        rep.className = 'rep-badge';
        rep.textContent = `× ${repetition_count} repetitions`;
        body.appendChild(rep);
      }
      wrap.appendChild(body);
    }
    return wrap;
  }

  function cmdClass(t) {
    if (!t) return 'cmd-other';
    if (t === 'arm') return 'cmd-arm';
    if (t === 'takeoff') return 'cmd-takeoff';
    if (t === 'land') return 'cmd-land';
    if (t === 'return_home') return 'cmd-return';
    if (t === 'goto_location') return 'cmd-goto';
    if (t === 'fly_forward') return 'cmd-forward';
    if (t === 'turn_left' || t === 'turn_right') return 'cmd-turn';
    if (t === 'fly_up' || t === 'fly_down') return 'cmd-fly';
    return 'cmd-other';
  }
  function fmtCmd(cmd) {
    const t = cmd.type || '?';
    if (t === 'arm') return 'ARM';
    if (t === 'land') return 'LAND';
    if (t === 'return_home') return 'RTH';
    if (t === 'takeoff') return `↑ TAKEOFF${cmd.value !== undefined ? ` ${cmd.value}m` : ''}`;
    if (t === 'fly_forward') return `→ FWD ${cmd.value}m`;
    if (t === 'fly_up')   return `⬆ UP ${cmd.value}m`;
    if (t === 'fly_down') return `⬇ DOWN ${cmd.value}m`;
    if (t === 'turn_left')  return `↺ L ${cmd.value}°`;
    if (t === 'turn_right') return `↻ R ${cmd.value}°`;
    if (t === 'goto_location') {
      const p = [];
      if (cmd.x !== undefined) p.push(`x=${cmd.x}`);
      if (cmd.y !== undefined) p.push(`y=${cmd.y}`);
      if (cmd.z !== undefined) p.push(`z=${cmd.z}`);
      return `⊙ ${p.join(' ')}`;
    }
    return t.replace(/_/g, ' ').toUpperCase();
  }

  /* ══════════════════════════════════════════════════
     TEXT LOG
  ══════════════════════════════════════════════════ */
  const TEXT_LOG_RE = /^\[(\d{2}:\d{2}:\d{2}\.\d+)\]\s+(INFO|WARNING|WARN|ERROR|DEBUG|CRITICAL|FATAL)\s+\[([^\]]+)\]\s+(.*)/;
  const DOCKER_RE   = /^[^\s|]+\s*\|\s*/;

  function parseTextLine(raw) {
    const line = raw.replace(DOCKER_RE, '').trim();
    const m = TEXT_LOG_RE.exec(line);
    if (!m) return null;
    return { time: m[1], level: normLevel(m[2]), source: m[3], msg: m[4] };
  }

  function renderTextLog(text) {
    const parsed = text.split('\n').map(parseTextLine).filter(Boolean);
    const pipelines = [];
    const pipelineIdxs = new Set();
    parsed.forEach((e, i) => {
      const pd = parsePipelineFromLogMsg(e.source, e.msg);
      if (pd) { pipelines.push(pd); pipelineIdxs.add(i); }
    });
    if (pipelines.length) {
      const section = document.createElement('div');
      section.className = 'pipeline-section';
      const hdr = document.createElement('div');
      hdr.className = 'pipeline-section-hdr';
      hdr.innerHTML = `<span class="toggle-arrow" style="transition:transform 0.2s">▶</span><span class="pipeline-section-title">Pipeline Profiles (${pipelines.length})</span>`;
      section.appendChild(hdr);
      const body = document.createElement('div');
      body.className = 'pipeline-section-body';
      body.style.display = 'none';
      pipelines.forEach(pd => body.appendChild(buildPipelineCard(pd)));
      section.appendChild(body);
      hdr.addEventListener('click', () => {
        const open = body.style.display !== 'none';
        body.style.display = open ? 'none' : 'flex';
        hdr.querySelector('.toggle-arrow').style.transform = open ? '' : 'rotate(90deg)';
      });
      logOutput.appendChild(section);
    }
    buildTextUI(parsed, pipelineIdxs);
  }

  /* ══════════════════════════════════════════════════
     MAVROS LOG
  ══════════════════════════════════════════════════ */
  const MAVROS_RE = /^\[(INFO|WARN|WARNING|ERROR|DEBUG|FATAL)\]\s+\[(\d+\.\d+)\]\s+\[([^\]]+)\]:\s+(.*)/;

  function parseMavrosLine(raw) {
    const m = MAVROS_RE.exec(raw.trim());
    if (!m) return null;
    const time = new Date(parseFloat(m[2]) * 1000).toISOString().slice(11, 23);
    return { time, level: normLevel(m[1]), source: m[3], msg: m[4] };
  }

  function renderMavrosLog(text) {
    buildTextUI(text.split('\n').map(parseMavrosLine).filter(Boolean), new Set());
  }

  /* ── Shared text log UI ──────────────────────────── */
  function buildTextUI(entries, pipelineIdxs) {
    const levels = [...new Set(entries.map(e => e.level))].sort();
    levelFilter.innerHTML = '<option value="">All levels</option>' +
      levels.map(l => `<option value="${l}">${l}</option>`).join('');

    const countEl = document.createElement('div');
    countEl.className = 'log-count';
    logOutput.appendChild(countEl);

    const list = document.createElement('div');
    list.className = 'log-list';

    const msgTexts = entries.map(e => e.msg);
    const lineEls = entries.map((e, idx) => {
      const el = document.createElement('div');
      el.className = 'log-line' + (pipelineIdxs.has(idx) ? ' is-pipeline-line' : '');
      el.dataset.level = e.level;
      el.dataset.raw = (e.source + ' ' + e.msg).toLowerCase();
      el.innerHTML = `<span class="log-time">${escHtml(e.time)}</span><span class="log-level-badge ${lvlClass(e.level)}">${escHtml(e.level)}</span><span class="log-source">[${escHtml(e.source)}]</span><span class="log-msg">${escHtml(e.msg)}</span>`;
      list.appendChild(el);
      return el;
    });
    logOutput.appendChild(list);

    function updateFilter() {
      const q = searchInput.value.toLowerCase().trim();
      const lv = levelFilter.value;
      let shown = 0;
      lineEls.forEach((el, idx) => {
        const vis = (!lv || el.dataset.level === lv) && (!q || el.dataset.raw.includes(q));
        el.classList.toggle('hidden', !vis);
        if (vis) {
          const span = el.querySelector('.log-msg');
          if (q) {
            const safe = escHtml(msgTexts[idx]);
            const safeQ = escHtml(q).replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            span.innerHTML = safe.replace(new RegExp(safeQ, 'gi'), m => `<span class="highlight">${m}</span>`);
          } else {
            span.textContent = msgTexts[idx];
          }
          shown++;
        }
      });
      countEl.textContent = `Showing ${shown} of ${lineEls.length} lines`;
    }

    searchInput.addEventListener('input', updateFilter);
    levelFilter.addEventListener('change', updateFilter);
    countEl.textContent = `${lineEls.length} lines`;
    if (!entries.length) list.innerHTML = '<p class="empty-msg">No parseable log lines found.</p>';
  }

  /* ── Paste panel ─────────────────────────────────── */
  let pasteTimer = null;
  pasteTA.addEventListener('input', () => {
    clearTimeout(pasteTimer);
    pasteTimer = setTimeout(() => {
      pasteResult.innerHTML = '';
      const text = pasteTA.value.trim();
      if (!text) return;
      const data = parsePipelineText(text);
      if (!data) {
        pasteResult.innerHTML = '<p style="color:#999;font-size:0.82rem;margin-top:0.5rem">Could not find a valid <code>stages=[...]</code> in the pasted text.</p>';
        return;
      }
      pasteResult.appendChild(buildPipelineCard(data));
    }, 200);
  });

  /* ── Helpers ─────────────────────────────────────── */
  function normLevel(l) {
    if (!l) return 'INFO';
    l = l.toUpperCase();
    if (l === 'WARNING' || l === 'WARN') return 'WARN';
    if (l === 'CRITICAL' || l === 'FATAL') return 'ERROR';
    return l;
  }
  function lvlClass(l) {
    if (l === 'INFO')  return 'lvl-info';
    if (l === 'WARN')  return 'lvl-warn';
    if (l === 'ERROR') return 'lvl-error';
    if (l === 'DEBUG') return 'lvl-debug';
    return 'lvl-other';
  }
  function fmtMs(ms) {
    ms = parseFloat(ms);
    if (ms >= 60000) return (ms / 1000).toFixed(1) + 's';
    if (ms >= 1000) return (ms / 1000).toFixed(2) + 's';
    if (ms >= 1) return ms.toFixed(1) + 'ms';
    return ms.toFixed(3) + 'ms';
  }
  function fmtBytes(b) {
    if (b >= 1024 * 1024) return (b / (1024 * 1024)).toFixed(1) + ' MB';
    return (b / 1024).toFixed(1) + ' KB';
  }
  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function fmtTime(iso) {
    try { return new Date(iso).toLocaleTimeString(undefined,{hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit'}); }
    catch(_) { return iso; }
  }
  function fmtDatetime(iso) {
    try { return new Date(iso).toLocaleString(undefined,{dateStyle:'medium',timeStyle:'medium'}); }
    catch(_) { return iso; }
  }
  function readBlob(blob) {
    return new Promise((resolve, reject) => {
      const r = new FileReader();
      r.onload = e => resolve(e.target.result);
      r.onerror = reject;
      r.readAsText(blob);
    });
  }
  function tick() { return new Promise(r => setTimeout(r, 0)); }
})();
</script>
</body>
</html>
